<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Telecom — Virtual Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #7b5cfa;
    --green: #00e676;
    --red: #ff1744;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --card: #16161f;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* NAV */
  nav {
    position:sticky; top:0; z-index:100;
    background:rgba(10,10,15,0.85);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    padding:0 2rem;
    display:flex; align-items:center; justify-content:space-between;
    height:64px;
  }
  .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; letter-spacing:-0.03em; }
  .nav-logo span { color:var(--accent); }
  .nav-actions { display:flex; gap:1rem; align-items:center; }
  .btn { padding:.5rem 1.2rem; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:500; cursor:pointer; border:none; transition:all .2s; }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .btn-accent { background:var(--accent); color:#000; font-weight:700; }
  .btn-accent:hover { background:#00cfeb; transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,229,255,.3); }

  /* HERO */
  .hero {
    padding:4rem 2rem 2rem;
    text-align:center;
    background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,229,255,.08) 0%, transparent 70%);
  }
  .hero-tag { display:inline-block; background:rgba(0,229,255,.1); border:1px solid rgba(0,229,255,.25); color:var(--accent); font-size:.75rem; font-weight:600; padding:.3rem .9rem; border-radius:99px; margin-bottom:1rem; letter-spacing:.08em; text-transform:uppercase; }
  .hero h1 { font-family:'Syne',sans-serif; font-size:clamp(2rem,5vw,3.5rem); font-weight:800; line-height:1.1; letter-spacing:-.03em; }
  .hero h1 span { color:var(--accent); }
  .hero p { color:var(--muted); margin:.8rem auto 0; max-width:480px; font-size:.95rem; line-height:1.6; }

  /* FILTER BAR */
  .filter-bar {
    padding:1.5rem 2rem;
    display:flex; gap:.75rem; flex-wrap:wrap; align-items:center;
    border-bottom:1px solid var(--border);
  }
  .filter-label { font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-right:.25rem; }
  .chip {
    padding:.4rem 1rem; border-radius:99px; font-size:.82rem; font-weight:500;
    cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted);
    transition:all .2s;
  }
  .chip:hover { border-color:var(--accent); color:var(--accent); }
  .chip.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
  .search-box {
    margin-left:auto;
    display:flex; align-items:center; gap:.5rem;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:.4rem .9rem;
  }
  .search-box input { background:none; border:none; outline:none; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.88rem; width:180px; }
  .search-box input::placeholder { color:var(--muted); }
  .search-icon { color:var(--muted); font-size:1rem; }

  /* STOCK FILTER */
  .stock-toggle { display:flex; gap:.5rem; }
  .stock-chip { padding:.35rem .9rem; border-radius:99px; font-size:.78rem; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all .2s; }
  .stock-chip.in.active { background:rgba(0,230,118,.15); border-color:var(--green); color:var(--green); }
  .stock-chip.out.active { background:rgba(255,23,68,.12); border-color:var(--red); color:var(--red); }

  /* GRID */
  .grid-section { padding:2rem; }
  .grid-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
  .grid-header h2 { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; }
  .count-badge { background:var(--surface2); border:1px solid var(--border); padding:.25rem .7rem; border-radius:99px; font-size:.8rem; color:var(--muted); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1.25rem; }

  /* CARD */
  .card {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    overflow:hidden; transition:all .25s; cursor:pointer;
    animation:fadeUp .4s ease both;
  }
  .card:hover { border-color:rgba(0,229,255,.35); transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,.4); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .card-media { position:relative; aspect-ratio:16/10; overflow:hidden; background:#0f0f18; }
  .card-media img { width:100%; height:100%; object-fit:cover; transition:transform .4s; }
  .card:hover .card-media img { transform:scale(1.05); }
  .play-overlay {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.45); opacity:0; transition:opacity .2s;
  }
  .card:hover .play-overlay { opacity:1; }
  .play-btn { width:44px; height:44px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; }
  .play-btn svg { width:18px; height:18px; fill:#000; margin-left:2px; }
  .stock-badge {
    position:absolute; top:.6rem; left:.6rem;
    padding:.22rem .65rem; border-radius:99px; font-size:.7rem; font-weight:700; letter-spacing:.06em;
    text-transform:uppercase;
  }
  .stock-badge.in { background:rgba(0,230,118,.18); color:var(--green); border:1px solid rgba(0,230,118,.35); }
  .stock-badge.out { background:rgba(255,23,68,.15); color:var(--red); border:1px solid rgba(255,23,68,.3); }
  .cat-badge {
    position:absolute; top:.6rem; right:.6rem;
    padding:.22rem .65rem; border-radius:99px; font-size:.7rem; font-weight:600;
    background:rgba(123,92,250,.2); color:var(--accent2); border:1px solid rgba(123,92,250,.35);
  }
  .card-body { padding:1rem; }
  .card-name { font-family:'Syne',sans-serif; font-size:.95rem; font-weight:700; margin-bottom:.3rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-desc { font-size:.8rem; color:var(--muted); line-height:1.5; margin-bottom:.75rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-footer { display:flex; justify-content:space-between; align-items:center; }
  .product-id { font-size:.75rem; font-family:'Syne',sans-serif; color:var(--accent); background:rgba(0,229,255,.08); border:1px solid rgba(0,229,255,.2); padding:.25rem .6rem; border-radius:6px; cursor:pointer; transition:all .2s; user-select:all; }
  .product-id:hover { background:rgba(0,229,255,.18); }
  .card-price { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; color:var(--text); }

  /* EMPTY */
  .empty { text-align:center; padding:4rem 2rem; color:var(--muted); }
  .empty-icon { font-size:3rem; margin-bottom:1rem; opacity:.4; }

  /* MODAL — VIEW */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.75); backdrop-filter:blur(8px);
    align-items:center; justify-content:center; padding:1rem;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    width:100%; max-width:960px; max-height:95vh; overflow-y:auto;
    animation:scaleIn .25s ease;
  }
  @keyframes scaleIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
  .modal-header { display:flex; justify-content:space-between; align-items:center; padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); }
  .modal-header h3 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; }
  .close-btn { width:32px; height:32px; border-radius:8px; background:var(--surface2); border:none; color:var(--muted); cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; transition:all .2s; }
  .close-btn:hover { color:var(--text); }
  .modal-body { padding:1.5rem; }
  .modal-video { width:100%; aspect-ratio:16/9; border-radius:12px; overflow:hidden; background:#000; margin-bottom:1.25rem; }
  .modal-video iframe { width:100%; height:100%; border:none; }
  .modal-img { width:100%; border-radius:12px; margin-bottom:1.25rem; }

  /* MULTI-IMAGE GALLERY */
  .gallery-main { width:100%; aspect-ratio:4/3; border-radius:14px; overflow:hidden; background:#0f0f18; margin-bottom:.75rem; position:relative; cursor:zoom-in; }
  .gallery-main img { width:100%; height:100%; object-fit:contain; background:#0f0f18; transition:transform .25s; }
  .gallery-main:hover img { transform:scale(1.02); }
  .gallery-zoom-hint { position:absolute; bottom:.6rem; right:.7rem; background:rgba(0,0,0,.55); color:rgba(255,255,255,.7); font-size:.7rem; padding:.2rem .5rem; border-radius:6px; pointer-events:none; }
  .gallery-thumbs { display:flex; gap:.6rem; margin-bottom:1.25rem; flex-wrap:wrap; }
  .gallery-thumb { width:76px; height:76px; border-radius:10px; overflow:hidden; border:2px solid var(--border); cursor:pointer; transition:all .2s; flex-shrink:0; }
  .gallery-thumb img { width:100%; height:100%; object-fit:cover; }
  .gallery-thumb.active { border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,229,255,.25); }
  .gallery-thumb:hover { border-color:rgba(0,229,255,.5); }

  /* FULLSCREEN LIGHTBOX */
  .lightbox { display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,.95); align-items:center; justify-content:center; cursor:zoom-out; }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:95vw; max-height:95vh; object-fit:contain; border-radius:8px; animation:scaleIn .2s ease; }
  .lightbox-close { position:absolute; top:1rem; right:1rem; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.1); border:none; color:#fff; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; }
  .lightbox-close:hover { background:rgba(255,255,255,.25); }
  .lightbox-nav { position:absolute; top:50%; transform:translateY(-50%); width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,.1); border:none; color:#fff; font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; }
  .lightbox-nav:hover { background:rgba(255,255,255,.25); }
  .lightbox-prev { left:1rem; }
  .lightbox-next { right:1rem; }
  .lightbox-counter { position:absolute; bottom:1rem; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.5); font-size:.8rem; }
  /* multi-image upload in admin */
  .multi-img-list { display:flex; flex-direction:column; gap:.5rem; margin-top:.5rem; }
  .multi-img-row { display:flex; align-items:center; gap:.5rem; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.4rem .6rem; }
  .multi-img-row img { width:36px; height:36px; object-fit:cover; border-radius:6px; background:#0f0f18; flex-shrink:0; }
  .multi-img-row input { flex:1; background:none; border:none; outline:none; color:var(--text); font-size:.82rem; font-family:'DM Sans',sans-serif; }
  .multi-img-row .rm-img { background:rgba(255,23,68,.1); color:var(--red); border:none; border-radius:6px; padding:.2rem .5rem; cursor:pointer; font-size:.75rem; font-weight:700; flex-shrink:0; }
  .add-img-row-btn { width:100%; padding:.45rem; border-radius:8px; background:transparent; border:1px dashed var(--border); color:var(--muted); font-size:.8rem; cursor:pointer; transition:all .2s; margin-top:.25rem; }
  .add-img-row-btn:hover { border-color:var(--accent); color:var(--accent); }
  .img-upload-area { display:flex; flex-direction:column; gap:.4rem; }
  .modal-meta { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1.25rem; }
  .meta-item { background:var(--surface2); border-radius:10px; padding:.75rem 1rem; }
  .meta-label { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.25rem; }
  .meta-value { font-family:'Syne',sans-serif; font-weight:600; font-size:.95rem; }
  .modal-desc { color:var(--muted); font-size:.88rem; line-height:1.7; margin-bottom:1.25rem; }
  .copy-id-btn { width:100%; padding:.75rem; border-radius:10px; background:rgba(0,229,255,.08); border:1px solid rgba(0,229,255,.25); color:var(--accent); font-family:'Syne',sans-serif; font-weight:700; font-size:.9rem; cursor:pointer; transition:all .2s; }
  .copy-id-btn:hover { background:rgba(0,229,255,.18); }

  /* ADMIN PANEL */
  .admin-panel {
    display:none; position:fixed; inset:0; z-index:300;
    background:rgba(0,0,0,.8); backdrop-filter:blur(10px);
    align-items:center; justify-content:center; padding:1rem;
  }
  .admin-panel.open { display:flex; }
  .admin-box {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    width:100%; max-width:560px; max-height:92vh; overflow-y:auto;
    animation:scaleIn .25s ease;
  }
  .admin-tabs { display:flex; border-bottom:1px solid var(--border); }
  .admin-tab { flex:1; padding:.9rem; text-align:center; font-size:.85rem; font-weight:600; cursor:pointer; color:var(--muted); border:none; background:none; border-bottom:2px solid transparent; transition:all .2s; }
  .admin-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .admin-form { padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
  .form-group { display:flex; flex-direction:column; gap:.4rem; }
  .form-label { font-size:.78rem; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.06em; }
  .form-input, .form-select, .form-textarea {
    background:var(--surface2); border:1px solid var(--border); border-radius:10px;
    color:var(--text); font-family:'DM Sans',sans-serif; font-size:.88rem;
    padding:.65rem .9rem; outline:none; transition:border-color .2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--accent); }
  .form-textarea { resize:vertical; min-height:80px; }
  .form-select option { background:var(--surface2); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
  .img-source-toggle { display:flex; gap:.5rem; }
  .img-src-btn { flex:1; padding:.5rem; border-radius:8px; font-size:.8rem; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all .2s; }
  .img-src-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,.08); }
  .submit-btn { padding:.75rem; border-radius:10px; background:var(--accent); border:none; color:#000; font-family:'Syne',sans-serif; font-weight:700; font-size:.9rem; cursor:pointer; transition:all .2s; margin-top:.5rem; }
  .submit-btn:hover { background:#00cfeb; }
  /* product list in admin */
  .admin-product-list { padding:1rem 1.5rem; display:flex; flex-direction:column; gap:.75rem; }
  .admin-product-row {
    background:var(--surface2); border:1px solid var(--border); border-radius:12px;
    padding:.85rem 1rem; display:flex; align-items:center; gap:.75rem;
  }
  .admin-product-row img { width:48px; height:48px; object-fit:cover; border-radius:8px; flex-shrink:0; background:#0f0f18; }
  .admin-row-info { flex:1; min-width:0; }
  .admin-row-name { font-weight:600; font-size:.88rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .admin-row-id { font-size:.73rem; color:var(--accent); margin-top:.15rem; }
  .admin-row-actions { display:flex; gap:.5rem; flex-shrink:0; }
  .stock-toggle-btn { padding:.3rem .75rem; border-radius:6px; font-size:.72rem; font-weight:700; cursor:pointer; border:none; transition:all .2s; }
  .stock-toggle-btn.in { background:rgba(0,230,118,.15); color:var(--green); }
  .stock-toggle-btn.out { background:rgba(255,23,68,.12); color:var(--red); }
  .del-btn { padding:.3rem .6rem; border-radius:6px; background:rgba(255,23,68,.1); color:var(--red); font-size:.75rem; font-weight:700; border:none; cursor:pointer; }
  /* login */
  .login-form { padding:2rem 1.5rem; display:flex; flex-direction:column; gap:1rem; }
  .login-form h3 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; text-align:center; margin-bottom:.5rem; }

  /* TOAST */
  .toast {
    position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:.65rem 1.2rem; font-size:.85rem; color:var(--text); z-index:999;
    transition:transform .3s ease; white-space:nowrap;
    box-shadow:0 8px 32px rgba(0,0,0,.4);
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* NO PRODUCTS */
  .no-results { grid-column:1/-1; text-align:center; padding:3rem; color:var(--muted); font-size:.9rem; }

  @media(max-width:600px) {
    .filter-bar { padding:1rem; }
    .search-box { width:100%; }
    .search-box input { width:100%; }
    .grid { grid-template-columns:1fr 1fr; gap:.75rem; }
    .modal-meta { grid-template-columns:1fr; }
    .form-row { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">VIP <span>Telecom</span></div>
  <div class="nav-actions">
    <button class="btn btn-outline" onclick="openAdmin()">⚙ Admin</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-tag">🔌 VIP Telecom Catalogue</div>
  <h1>Find Your <span>Perfect</span><br>Accessory</h1>
  <p>Browse our full collection of chargers, cables, headphones & more. Copy a Product ID and order via Facebook.</p>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Category</span>
  <button class="chip active" onclick="setCategory('All',this)">All</button>
  <button class="chip" onclick="setCategory('Phone Charger',this)">Phone Charger</button>
  <button class="chip" onclick="setCategory('Headphone',this)">Headphone</button>
  <button class="chip" onclick="setCategory('Cable',this)">Cable</button>
  <button class="chip" onclick="setCategory('Earphone',this)">Earphone</button>
  <button class="chip" onclick="setCategory('Power Bank',this)">Power Bank</button>
  <button class="chip" onclick="setCategory('Speaker',this)">Speaker</button>
  <button class="chip" onclick="setCategory('Neckband',this)">Neckband</button>
  <button class="chip" onclick="setCategory('Ear Buds',this)">Ear Buds</button>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search products..." id="searchInput" oninput="renderProducts()"/>
  </div>
</div>

<!-- STOCK FILTER -->
<div class="filter-bar" style="padding-top:.75rem;padding-bottom:.75rem;border-top:none;">
  <span class="filter-label">Stock</span>
  <div class="stock-toggle">
    <button class="stock-chip active" id="stockAll" onclick="setStock('all',this)">All</button>
    <button class="stock-chip in" id="stockIn" onclick="setStock('in',this)">✔ In Stock</button>
    <button class="stock-chip out" id="stockOut" onclick="setStock('out',this)">✖ Out of Stock</button>
  </div>
</div>

<!-- GRID -->
<div class="grid-section">
  <div class="grid-header">
    <h2>Products</h2>
    <span class="count-badge" id="countBadge">0 items</span>
  </div>
  <div class="grid" id="productGrid"></div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Product Name</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- FULLSCREEN LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(event,-1)">‹</button>
  <img id="lightboxImg" src="" alt="Full image"/>
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(event,1)">›</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<!-- ADMIN LOGIN / PANEL -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-box">
    <div class="modal-header">
      <h3>⚙ Admin Panel</h3>
      <button class="close-btn" onclick="closeAdmin()">✕</button>
    </div>
    <div id="adminContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

// Save a single product to Firestore (add or update)
async function saveProduct(p) {
  if(!db) { showToast("❌ Firebase not connected"); return false; }
  try {
    // Firestore has a ~1MB doc limit — base64 images will cause silent failures.
    // Strip base64 data URIs and warn the user to use URLs instead.
    const safeImages = (p.images || []).filter(v => {
      if(v && v.startsWith("data:")) {
        showToast("⚠️ Uploaded files can't be saved to Firebase. Use image URLs instead.");
        return false;
      }
      return v && v.trim() !== '';
    });
    const safeP = { ...p, images: safeImages, image: safeImages[0] || '' };
    await db.collection(COL).doc(safeP.id).set(safeP);
    console.log("✅ Saved to Firestore:", safeP.id);
    return true;
  } catch(e) {
    showToast("❌ Save error: " + e.message);
    console.error("Firestore save error:", e);
    return false;
  }
}

async function deleteProductFromDB(id) {
  if(!db) { showToast("❌ Firebase not connected"); return; }
  try {
    await db.collection(COL).doc(id).delete();
    console.log("✅ Deleted from Firestore:", id);
  } catch(e) {
    showToast("❌ Delete error: " + e.message);
  }
}

function startRealtimeSync() {
  if(!db) {
    console.warn("Firebase not available — falling back to localStorage");
    showSetupBanner();
    products = JSON.parse(localStorage.getItem("electroProducts") || "[]");
    renderProducts();
    return;
  }
  showLoadingState(true);
  db.collection(COL).orderBy ? // Firestore available
  db.collection(COL).onSnapshot((snapshot) => {
    products = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    dbReady = true;
    showLoadingState(false);
    console.log("✅ Firestore sync:", products.length, "products");
    renderProducts();
    // Refresh manage list if open
    const tabManage = document.getElementById("tabManage");
    if(tabManage && tabManage.classList.contains("active")) showManageList();
  }, (err) => {
    console.error("Firestore snapshot error:", err);
    showLoadingState(false);
    showToast("❌ DB Error: " + err.code + " — check Firestore rules");
    products = JSON.parse(localStorage.getItem("electroProducts") || "[]");
    renderProducts();
  })
  :
  (showLoadingState(false), showSetupBanner());
}

// ── RENDER GRID ────────────────────────────────────────────────────────────
function renderProducts() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  let list = products.filter(p => {
    const matchCat = activeCategory==="All" || p.category===activeCategory;
    const matchStock = activeStock==="all" || (activeStock==="in"&&p.inStock) || (activeStock==="out"&&!p.inStock);
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q) || p.category.toLowerCase().includes(q);
    return matchCat && matchStock && matchQ;
  });
  document.getElementById("countBadge").textContent = list.length + " item" + (list.length!==1?"s":"");
  const grid = document.getElementById("productGrid");
  if(list.length===0) {
    grid.innerHTML = '<div class="no-results">No products found. Try a different filter or search.</div>';
    return;
  }
  grid.innerHTML = list.map((p,i) => {
    const firstImg = (p.images && p.images.length) ? p.images[0] : (p.image || '');
    const hasMultiple = p.images && p.images.length > 1;
    return `
    <div class="card" style="animation-delay:${i*0.04}s" onclick="openProduct('${p.id}')">
      <div class="card-media">
        <img src="${firstImg||'https://placehold.co/400x250/13131a/444?text=No+Image'}" alt="${p.name}" onerror="this.src='https://placehold.co/400x250/13131a/444?text=No+Image'"/>
        ${p.youtubeId?`<div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>`:''}
        ${hasMultiple?`<div style="position:absolute;bottom:.5rem;right:.5rem;background:rgba(0,0,0,.6);border-radius:99px;padding:.15rem .5rem;font-size:.7rem;color:#fff;">📷 ${p.images.length}</div>`:''}
        <span class="stock-badge ${p.inStock?'in':'out'}">${p.inStock?'In Stock':'Out of Stock'}</span>
        <span class="cat-badge">${p.category}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc||'No description provided.'}</div>
        <div class="card-footer">
          <span class="product-id" title="Click to copy ID" onclick="copyId(event,'${p.id}')">${p.id}</span>
          ${p.price?`<span class="card-price">৳${p.price}</span>`:''}
        </div>
      </div>
    </div>
  `}).join("");
}

function switchGallery(thumb, src, idx) {
  document.getElementById("galleryMain").src = src;
  window._galleryIdx = idx || 0;
  document.querySelectorAll(".gallery-thumb").forEach(t=>t.classList.remove("active"));
  thumb.classList.add("active");
}

function openLightbox(idx) {
  const imgs = window._galleryImgs || [];
  if(!imgs.length) return;
  window._galleryIdx = idx || 0;
  const lb = document.getElementById("lightbox");
  document.getElementById("lightboxImg").src = imgs[window._galleryIdx];
  updateLightboxCounter();
  lb.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow = "";
}

function lightboxNav(e, dir) {
  e.stopPropagation();
  const imgs = window._galleryImgs || [];
  if(!imgs.length) return;
  window._galleryIdx = (window._galleryIdx + dir + imgs.length) % imgs.length;
  document.getElementById("lightboxImg").src = imgs[window._galleryIdx];
  updateLightboxCounter();
  // sync thumbnail
  document.querySelectorAll(".gallery-thumb").forEach((t,i)=>t.classList.toggle("active", i===window._galleryIdx));
  const main = document.getElementById("galleryMain");
  if(main) main.src = imgs[window._galleryIdx];
}

function updateLightboxCounter() {
  const imgs = window._galleryImgs || [];
  document.getElementById("lightboxCounter").textContent = imgs.length > 1 ? `${window._galleryIdx+1} / ${imgs.length}` : "";
}

// Close lightbox on Escape key
document.addEventListener("keydown", e => {
  if(e.key === "Escape") {
    if(document.getElementById("lightbox").classList.contains("open")) { closeLightbox(); }
    else { closeModal(); closeAdmin(); }
  }
  if(document.getElementById("lightbox").classList.contains("open")) {
    if(e.key === "ArrowRight") lightboxNav({stopPropagation:()=>{}}, 1);
    if(e.key === "ArrowLeft") lightboxNav({stopPropagation:()=>{}}, -1);
  }
});

    pendingImages[i].value = val;
    // update thumbnail
    const rows = document.querySelectorAll(".multi-img-row");
    if(rows[i]) {
      const thumb = rows[i].querySelector("img");
      if(thumb) thumb.src = val || 'https://placehold.co/36x36/13131a/444?text=?';
    }
  }
}

function removeImg(i) {
  pendingImages.splice(i,1);
  renderMultiImgList();
}

function handleMultiFileSelect(input) {
  const files = Array.from(input.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      pendingImages.push({type:'file', value: e.target.result});
      loaded++;
      if(loaded === files.length) renderMultiImgList();
    };
    reader.readAsDataURL(file);
  });
}

async function submitProduct() {
  const nameEl  = document.getElementById("fName");
  const catEl   = document.getElementById("fCat");
  const priceEl = document.getElementById("fPrice");
  const ytEl    = document.getElementById("fYT");
  const descEl  = document.getElementById("fDesc");
  const stockEl = document.getElementById("fStock");

  if(!nameEl) { showToast("❌ Form not found, please try again"); return; }

  const name  = nameEl.value.trim();
  const cat   = catEl.value;
  const price = priceEl.value.trim();
  const yt    = ytEl.value.trim();
  const desc  = descEl.value.trim();
  const stock = stockEl.value === "in";

  if(!name) { showToast("❌ Product name is required"); return; }

  const images = pendingImages.map(item => item.value).filter(v => v && v.trim() !== '');

  let ytId = yt;
  const ytMatch = yt.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  if(ytMatch) ytId = ytMatch[1];

  const btn = document.querySelector(".submit-btn");
  if(btn) { btn.disabled = true; btn.textContent = "Saving…"; }

  let productObj;
  if(editingId) {
    const existing = products.find(p => p.id === editingId) || {};
    productObj = { ...existing, name, category:cat, price, images, image:images[0]||'', youtubeId:ytId, desc, inStock:stock };
  } else {
    productObj = { id:newId(), name, category:cat, price, images, image:images[0]||'', youtubeId:ytId, desc, inStock:stock };
  }

  if(dbReady) {
    const ok = await saveProduct(productObj);
    if(ok) {
      showToast(editingId ? "✅ Product updated!" : "✅ Product added!");
      // onSnapshot will update products[] and renderProducts() automatically.
      // Also refresh the manage list if it is currently open.
      const tabManage = document.getElementById("tabManage");
      if(tabManage && tabManage.classList.contains("active")) showManageList();
    }
  } else {
    if(editingId) {
      const idx = products.findIndex(p => p.id === editingId);
      if(idx > -1) products[idx] = productObj;
    } else {
      products.push(productObj);
    }
    save();
    renderProducts();
    showToast(editingId ? "✅ Updated (local only)" : "✅ Added (local only — Firebase not set up)");
  }

  editingId = null;
  pendingImages = [];
  renderAdminForm(null);
  // Re-enable button after form re-renders
  setTimeout(() => {
    const newBtn = document.querySelector(".submit-btn");
    if(newBtn) { newBtn.disabled = false; newBtn.textContent = "➕ Add Product"; }
  }, 100);
}

function showManageList() {
  if(products.length===0) {
    document.getElementById("tabContent").innerHTML = `<div style="padding:2rem;text-align:center;color:var(--muted);">No products yet. Add some!</div>`;
    return;
  }
  document.getElementById("tabContent").innerHTML = `
    <div class="admin-product-list">
      ${products.map(p=>`
        <div class="admin-product-row">
          <img src="${p.image||'https://placehold.co/48x48/13131a/444?text=?'}" onerror="this.src='https://placehold.co/48x48/13131a/444?text=?'"/>
          <div class="admin-row-info">
            <div class="admin-row-name">${p.name}</div>
            <div class="admin-row-id">${p.id} · ${p.category}</div>
          </div>
          <div class="admin-row-actions">
            <button class="stock-toggle-btn ${p.inStock?'in':'out'}" onclick="toggleStock('${p.id}')">${p.inStock?'In Stock':'Out of Stock'}</button>
            <button class="btn btn-outline" style="padding:.3rem .6rem;font-size:.75rem" onclick="editProduct('${p.id}')">✏</button>
            <button class="del-btn" onclick="deleteProduct('${p.id}')">🗑</button>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

async function toggleStock(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const updated = { ...p, inStock: !p.inStock };
  if(dbReady) {
    // Optimistically update local state so the UI feels instant
    const idx = products.findIndex(x=>x.id===id);
    if(idx > -1) products[idx] = updated;
    renderProducts();
    showManageList();
    const ok = await saveProduct(updated);
    if(ok) {
      showToast(`📦 ${p.name} → ${updated.inStock?'✔ In Stock':'✖ Out of Stock'}`);
    } else {
      // Revert on failure
      if(idx > -1) products[idx] = p;
      renderProducts();
      showManageList();
    }
  } else {
    p.inStock = !p.inStock;
    save(); renderProducts(); showManageList();
    showToast(`📦 ${p.name} → ${p.inStock?'✔ In Stock':'✖ Out of Stock'}`);
  }
}

async function deleteProduct(id) {
  if(!confirm("Delete this product? This cannot be undone.")) return;
  editingId = null;
  pendingImages = [];
  if(dbReady) {
    // Optimistically remove from local state for instant UI feedback
    products = products.filter(x => x.id !== id);
    renderProducts();
    showManageList();
    await deleteProductFromDB(id);
    showToast("🗑 Product deleted");
    // onSnapshot will confirm the deletion in the background
  } else {
    products = products.filter(x => x.id !== id);
    save(); renderProducts(); showManageList();
    showToast("🗑 Product deleted");
  }
}

function editProduct(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return;
  switchTab("add");
  document.getElementById("tabAdd").classList.add("active");
  document.getElementById("tabManage").classList.remove("active");
  showAddForm(p);
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2800);
}

// ── CLOSE ON OVERLAY CLICK ─────────────────────────────────────────────────
document.getElementById("productModal").addEventListener("click", function(e){ if(e.target===this) closeModal(); });
document.getElementById("adminPanel").addEventListener("click", function(e){ if(e.target===this) closeAdmin(); });

// ── INIT ───────────────────────────────────────────────────────────────────
startRealtimeSync();

</script>
